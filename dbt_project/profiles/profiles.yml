crypto_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      # Leer credenciales desde variables de entorno
      # dbt resuelve {{ env_var('...') }} en tiempo de ejecución
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      port: 5432
      schema: public
      threads: 2